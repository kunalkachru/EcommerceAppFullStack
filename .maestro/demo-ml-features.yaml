appId: org.reactjs.native.example.EcommerceAppFullStack
---
- runFlow: shared/login.yaml

# --- Text search (rules only, no LLM) ---
- tapOn:
    id: "tab-products"
- extendedWaitUntil:
    visible: "Narrow search (optional)"
    timeout: 12000
- tapOn:
    text: "Search products... e.g. below 45"
- inputText: "wireless headphones below 100"
- hideKeyboard
- extendedWaitUntil:
    visible: "Add"
    timeout: 12000

# --- Home: voice + LLM reasoning ---
- tapOn:
    id: "tab-home"
- scrollUntilVisible:
    element: "Shop with your voice"
    direction: DOWN

# Enable AI reasoning switch
- tapOn:
    id: "voice-llm-switch"

# Select provider chip via stable testID
- tapOn:
    id: "voice-provider-openai"

# Paste API key from env DEMO_LLM_API_KEY (from src/.env via npm script)
- tapOn:
    id: "voice-api-key-input"
- inputText: ${DEMO_LLM_API_KEY}
- hideKeyboard
- runFlow: shared/dismiss-save-password.yaml

# Typed smart search with LLM
- tapOn:
    id: "voice-typed-query-input"
- inputText: "it's a fifty dollars jacket blue please"
- pressKey: Enter
- runFlow: shared/dismiss-save-password.yaml
- extendedWaitUntil:
    visible: "Add"
    timeout: 7000
    optional: true
- runFlow: shared/dismiss-save-password.yaml
- extendedWaitUntil:
    visible: "Add"
    timeout: 20000

- tapOn:
    id: "tab-home"

# --- Photo search on Home ---
- scrollUntilVisible:
    element: "Search by photo"
    direction: DOWN
- tapOn: "Gallery"
- extendedWaitUntil:
    visible: "Photos"
    timeout: 10000
    optional: true
- tapOn:
    point: "25%,30%"
- extendedWaitUntil:
    visible: "Closest match"
    timeout: 20000
    optional: true
- scrollUntilVisible:
    element: "Best matches"
    direction: DOWN
- extendedWaitUntil:
    visible: "Best matches"
    timeout: 15000
