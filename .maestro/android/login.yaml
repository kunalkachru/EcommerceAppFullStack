appId: com.ecommerceappfullstack
---
# Android-specific login flow
# Uses explicit field taps for proper form field isolation on Android

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "ShopEase"
    timeout: 20000

- runFlow:
    when:
      visible: "Sign in ↓"
    commands:
      - tapOn: "Sign in ↓"

- extendedWaitUntil:
    visible: "Sign in"
    timeout: 8000

# Android login - explicit field taps to avoid Tab key issues
- scrollUntilVisible:
    element:
      id: "login-email"
    direction: DOWN
    timeout: 12000

- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 5000

- tapOn:
    id: "login-email"

- inputText: "test@example.com"

# The on-screen keyboard covers ~40% of the screen once shown (Android shows
# it for touch-focused fields regardless of hw.keyboard=yes -- it only
# suppresses once a *real* physical key event proves hardware keyboard use).
# Whether login-password ends up hidden behind it depends on scroll position,
# so scroll to it explicitly (accounts for the keyboard's on-screen bounds)
# instead of a plain visibility check against a static hierarchy position.
# See docs/superpowers/specs/2026-07-10-e2e-keyboard-and-llm-testing-
# robustness-design.md.
- scrollUntilVisible:
    element:
      id: "login-password"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "login-password"

- inputText: "secret123"

# Dismiss keyboard before scrolling -- pressKey: back is intercepted by the
# IME (dismisses the keyboard) whenever it's actually showing.
- pressKey: back

- extendedWaitUntil:
    visible:
      id: "login-submit"
    timeout: 5000

- scrollUntilVisible:
    element:
      id: "login-submit"
    direction: DOWN
    timeout: 3000

- tapOn:
    id: "login-submit"

# Dismiss save password prompt if it appears
- runFlow:
    when:
      visible: "Save password"
    commands:
      - tapOn: "Not now"

# Wait for home screen - login is complete when sign in screen is gone
- extendedWaitUntil:
    visible:
      id: "tab-home"
    timeout: 10000
    optional: true
