appId: ${APP_ID}
---
- runFlow: ../shared/login.yaml
- tapOn:
    id: "tab-home"
# Option B: home-scroll wrapper + voice card (Option A: same scroll pattern as F17)
- scrollUntilVisible:
    element:
      id: "voice-search-card"
    direction: DOWN
    timeout: 15000
# --- Enable LLM (Option A: switch + coordinate fallback from demo-ml-features) ---
- tapOn:
    id: "llm-reasoning-switch"
- extendedWaitUntil:
    visible:
      id: "voice-api-key-input"
    timeout: 10000
- runFlow:
    when:
      notVisible:
        id: "voice-api-key-input"
    commands:
      - tapOn:
          text: "AI reasoning (LLM)"
          point: "95%,50%"
      - tapOn:
          id: "llm-reasoning-switch"
      - extendedWaitUntil:
          visible:
            id: "voice-api-key-input"
          timeout: 10000
- scrollUntilVisible:
    element:
      id: "voice-api-key-input"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "voice-api-key-input"
- inputText: ${DEMO_LLM_API_KEY}
- hideKeyboard
- runFlow: ../shared/dismiss-save-password.yaml
- tapOn:
    id: "voice-provider-openrouter"
    optional: true
# --- Option B: sticky search bar (visible below key section when LLM on) ---
- scrollUntilVisible:
    element:
      id: "voice-llm-sticky-search"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "voice-typed-query-sticky"
- eraseText
- inputText: "it's a fifty dollars jacket blue please"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Add"
    timeout: 90000
    optional: true
- runFlow:
    when:
      notVisible: "Add"
    commands:
      - hideKeyboard
      - scrollUntilVisible:
          element:
            id: "voice-search-button-sticky"
          direction: DOWN
          timeout: 15000
      - tapOn:
          id: "voice-search-button-sticky"
      - extendedWaitUntil:
          visible: "Add"
          timeout: 90000
          optional: true
- runFlow:
    when:
      notVisible: "Add"
    commands:
      - scrollUntilVisible:
          element:
            id: "voice-typed-query-input"
          direction: DOWN
          timeout: 15000
      - tapOn:
          id: "voice-typed-query-input"
      - eraseText
      - inputText: "it's a fifty dollars jacket blue please"
      - hideKeyboard
      - tapOn:
          id: "voice-search-button"
      - extendedWaitUntil:
          visible: "Add"
          timeout: 90000
