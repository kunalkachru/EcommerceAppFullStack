appId: ${APP_ID}
---
- runFlow: ../shared/login.yaml
- tapOn:
    id: "tab-home"
- scrollUntilVisible:
    element:
      id: "photo-gallery-button"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "photo-gallery-button"
- extendedWaitUntil:
    visible: "Photos"
    timeout: 10000
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    point: "17%,60%"
- extendedWaitUntil:
    visible:
      id: "photo-results-section"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "photo-closest-match"
    timeout: 120000
- scrollUntilVisible:
    element:
      id: "photo-match-card-.*"
    direction: DOWN
    timeout: 15000
    optional: true
- tapOn:
    id: "photo-closest-match"
- runFlow:
    when:
      notVisible:
        id: "pdp-add-to-cart"
    commands:
      - scrollUntilVisible:
          element:
            id: "photo-match-card-.*"
          direction: DOWN
          timeout: 10000
      - tapOn:
          id: "photo-match-card-.*"
- extendedWaitUntil:
    visible:
      id: "pdp-add-to-cart"
    timeout: 10000
