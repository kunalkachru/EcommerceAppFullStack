appId: ${APP_ID}
---
# Credentials only — caller must already be on login screen
- scrollUntilVisible:
    element:
      id: "login-email"
    direction: DOWN
    timeout: 12000
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 5000
- tapOn:
    id: "login-email"
- eraseText
- inputText: "test@example.com"

- tapOn:
    id: "login-password"
- eraseText
- inputText: "secret123"
- scrollUntilVisible:
    element:
      id: "login-submit"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "login-submit"
- runFlow: dismiss-save-password.yaml
- extendedWaitUntil:
    visible: "Start with how you think"
    timeout: 5000
    optional: true
- runFlow: dismiss-save-password.yaml
- extendedWaitUntil:
    visible: "Start with how you think"
    timeout: 15000
