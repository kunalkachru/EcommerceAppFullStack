appId: ${APP_ID}
---
# Shared login — demo credentials only (not LLM secrets)
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "ShopEase"
    timeout: 20000
- runFlow:
    when:
      visible: "Sign in ↓"
    commands:
      - tapOn: "Sign in ↓"
- extendedWaitUntil:
    visible: "Sign in"
    timeout: 8000
- runFlow: login-only.yaml
