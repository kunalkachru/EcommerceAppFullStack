appId: org.reactjs.native.example.EcommerceAppFullStack
---
- runFlow: shared/login.yaml

- tapOn:
    id: "tab-products"
- extendedWaitUntil:
    visible: "Narrow search (optional)"
    timeout: 12000
- tapOn: "Essence Mascara Lash Princess"
- extendedWaitUntil:
    visible: "Add to Cart"
    timeout: 8000
- tapOn: "Add to Cart"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

- tapOn:
    id: "tab-cart"
- extendedWaitUntil:
    visible: "Proceed to Checkout"
    timeout: 8000
- scrollUntilVisible:
    element: "Proceed to Checkout"
    direction: DOWN
- tapOn: "Proceed to Checkout"

# Fill checkout form using testIDs — all fields use tap + clear + input pattern (safer for iOS)
- tapOn:
    id: "checkout-field-fullname"
- clearText
- inputText: "Demo User"

- tapOn:
    id: "checkout-field-address"
- clearText
- inputText: "1 Demo Street"

- tapOn:
    id: "checkout-field-city"
- clearText
- inputText: "Austin"

- tapOn:
    id: "checkout-field-zipcode"
- clearText
- inputText: "78701"

- tapOn:
    id: "checkout-field-phone"
- clearText
- inputText: "5551234567"
# Select payment method using testID
- scrollUntilVisible:
    element:
      id: "checkout-payment-credit-card"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "checkout-payment-credit-card"

# Scroll to and tap place order button
- scrollUntilVisible:
    element:
      id: "checkout-place-order"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "checkout-place-order"
- extendedWaitUntil:
    visible: "Order Summary"
    timeout: 12000

- tapOn:
    id: "tab-orders"
- extendedWaitUntil:
    visible: "Your Orders"
    timeout: 8000
