appId: com.ecommerceappfullstack
---
# Android ML Features - Comprehensive End-to-End Testing
# Tests: Text Search with AI Reasoning, Voice Search, Image/Photo Search

# ============================================================================
# SETUP: Login First (Required for ML Features)
# ============================================================================
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "ShopEase"
    timeout: 20000

- runFlow:
    when:
      visible: "Sign in ↓"
    commands:
      - tapOn: "Sign in ↓"

- extendedWaitUntil:
    visible: "Sign in"
    timeout: 8000

- scrollUntilVisible:
    element:
      id: "login-email"
    direction: DOWN
    timeout: 12000

- tapOn:
    id: "login-email"

- inputText: "test@example.com"

- pressKey: back

- tapOn:
    id: "login-password"

- inputText: "secret123"

- pressKey: back

- scrollUntilVisible:
    element:
      id: "login-submit"
    direction: DOWN
    timeout: 3000

- tapOn:
    id: "login-submit"

- runFlow:
    when:
      visible: "Save password"
    commands:
      - tapOn: "Not now"

- extendedWaitUntil:
    visible:
      id: "tab-home"
    timeout: 15000

# ============================================================================
# PHASE 1: TEXT SEARCH with AI Reasoning
# ============================================================================
- tapOn:
    id: "tab-products"

- extendedWaitUntil:
    visible:
      id: "tab-products"
    timeout: 8000

# Look for search input field
- extendedWaitUntil:
    visible:
      text: "Search products"
    timeout: 10000
    optional: true

# Tap search field
- tapOn:
    text: "Search products"
    optional: true

- tapOn:
    text: "e.g. below 45"
    optional: true

# Test 1: Natural language search with AI reasoning
- inputText: "affordable makeup under 20 dollars"

# Press search/go
- pressKey: back

# Wait for AI-powered results (should use OpenAI reasoning)
- extendedWaitUntil:
    visible:
      text: "Essence"
    timeout: 15000
    optional: true

- extendedWaitUntil:
    visible:
      text: "$"
    timeout: 8000
    optional: true

# ============================================================================
# PHASE 2: VOICE SEARCH (Capability Check)
# ============================================================================
# Look for voice search button/icon
- extendedWaitUntil:
    visible:
      text: "Voice"
    timeout: 8000
    optional: true

# Note: Actual voice input via Maestro requires special handling
# We verify the voice search UI element is accessible
- tapOn:
    text: "Voice"
    optional: true

- extendedWaitUntil:
    visible:
      text: "speak"
    timeout: 5000
    optional: true

# ============================================================================
# PHASE 3: IMAGE/PHOTO SEARCH (Camera Capability)
# ============================================================================
# Navigate back to products
- tapOn:
    id: "tab-products"
    optional: true

- extendedWaitUntil:
    visible:
      id: "tab-products"
    timeout: 8000
    optional: true

# Look for camera/photo search icon
- extendedWaitUntil:
    visible:
      text: "Search"
    timeout: 8000
    optional: true

# Look for photo/camera icon in search area
- tapOn:
    text: "photo"
    optional: true

- extendedWaitUntil:
    visible:
      text: "camera"
    timeout: 5000
    optional: true

# ============================================================================
# PHASE 4: VERIFY AI REASONING is ACTIVE
# ============================================================================
# Perform another search to verify OpenAI integration
- tapOn:
    text: "Search"
    optional: true

- inputText: "red lipstick"

- pressKey: back

# Wait for results - verify AI matched the query
- extendedWaitUntil:
    visible:
      text: "lipstick"
    timeout: 15000
    optional: true

# ============================================================================
# PHASE 5: ML FEATURES SUMMARY CHECK
# ============================================================================
# Verify all ML discovery options are available on home screen
- tapOn:
    id: "tab-home"
    optional: true

- extendedWaitUntil:
    visible:
      text: "DISCOVERY"
    timeout: 10000
    optional: true

- extendedWaitUntil:
    visible:
      text: "Text"
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      text: "voice"
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      text: "photo"
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      text: "SEARCH STYLE"
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      text: "Ambient"
    timeout: 5000
    optional: true

# ============================================================================
# TEST COMPLETE
# ============================================================================
