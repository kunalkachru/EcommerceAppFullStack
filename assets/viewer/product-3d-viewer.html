<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Product 3D Viewer</title>
  <script type="module" src="model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f5efe6;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
  ></model-viewer>
  <script type="module" src="product-3d-viewer.js"></script>
</body>
</html>
